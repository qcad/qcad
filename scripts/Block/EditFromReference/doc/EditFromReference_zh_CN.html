<h3>说明</h3>
<p>使用此工具，可以通过选择现有的块参照实体来编辑块。如果您不知道要编辑的块的名称，这将很有用，而且通常更快。</p><h3>使用方法</h3>
<ul>
<li>单击任何引用您要编辑的块的块参照实体。</li>
</ul>
<p>块已打开进行编辑。要返回主图形（称为"<em>Model<em>Space"），请编辑块"</em>Model</em>Space"或在"Block"菜单中启动"Edit Main Drawing"工具。</p></body>
