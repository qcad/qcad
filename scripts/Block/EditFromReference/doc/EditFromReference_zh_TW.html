<h3>說明</h3>
<p>使用此工具，可以通過選擇現有的圖塊參照實體來編輯圖塊。如果您不知道要編輯的圖塊名稱，這將很有用，而且通常更快。</p><h3>使用方式</h3>
<ul>
<li>按一下任何參照您要編輯的圖塊的圖塊參照實體。</li>
</ul>
<p>圖塊已開啟以進行編輯。要返回主圖紙（稱為「<em>Model<em>Space」），請編輯圖塊「</em>Model</em>Space」或在「Block」選單中啟動「Edit Main Drawing」工具。</p></body>
