<h3>说明</h3>
<p>从现有实体创建一个新块。</p><h3>使用方法</h3>
<ol>
<li>选择要用于新块的实体。</li>
<li>指定块的参考点。</li>
<li>在显示的对话框中为新块输入名称，然后单击 OK。</li>
</ol>
<p>块现在已添加到块列表中，其实例可以插入到图形中。您在第一步中选择的实体将被移除，并替换为新创建块的块参照。</p></body>
