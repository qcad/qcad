<h3>說明</h3>
<p>從現有實體建立一個新圖塊。</p><h3>使用方式</h3>
<ol>
<li>選擇要用於新圖塊的實體。</li>
<li>指定圖塊的參考點。</li>
<li>在顯示的對話方塊中為新圖塊輸入名稱，然後按一下 OK。</li>
</ol>
<p>圖塊現已加入圖塊列表，其實例可以插入到圖紙中。您在第一步中選擇的實體將被移除，並替換為新建圖塊的圖塊參照。</p></body>
