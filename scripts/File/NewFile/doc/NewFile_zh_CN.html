<h3>说明</h3>
<p>使用此命令创建新的空图形。新图形完全为空（没有实体，只有一个默认图层，没有块）。作为 QCAD 的常用用户，您可能希望改为创建包含您最常用的图层和块以及可能的图框的图形模板。一旦您有了这样的模板，就可以加载它，而不是从头开始新图形。 请参阅<a href="/zh_CN/manual/scripts/Pro/File/NewFromTemplate/doc/NewFromTemplate">从模板新建</a>命令，了解如何使用图形模板。</p></body>
