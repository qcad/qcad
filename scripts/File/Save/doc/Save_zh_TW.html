<p>此指令將目前圖紙儲存到載入它的同一檔案。如果您想儲存新建的圖紙或將目前圖紙儲存到新檔案，請改用選單<a href="/zh_TW/manual/scripts/File/SaveAs/doc/SaveAs">檔案 - 另存新檔</a>。然後系統會在儲存圖紙前詢問您檔案名稱。</p></body>
