<h3>说明</h3>
<p>此工具将当前图形导出为位图文件。</p><h3>使用方法</h3>
<p>将显示一个用于选择输出文件的对话框。指定文件名后，第二个对话框会询问您位图大小和首选背景色。 请注意，导出非常大尺寸的位图可能需要很长时间，具体取决于您的硬件。位图的最大尺寸为宽 x 高 ≤ 2.147.483.647。</p></body>
