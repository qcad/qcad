<h3>說明</h3>
<p>此工具將目前圖紙匯出為點陣圖檔案。</p><h3>使用方式</h3>
<p>將顯示一個用於選擇輸出檔案的對話方塊。指定檔案名稱後，第二個對話方塊會詢問您點陣圖大小和偏好的背景色。 請注意，匯出非常大尺寸的點陣圖可能需要很長時間，具體取決於您的硬體。點陣圖的最大尺寸為寬 x 高 ≤ 2.147.483.647。</p></body>
