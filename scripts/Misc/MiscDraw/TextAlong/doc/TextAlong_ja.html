<h3>説明</h3>
<p>このツールを使用して、線分、円弧、または円に沿ってテキストを描画します。</p><h3>使用方法</h3>
<p><a href="qthelp://org.qcad/referencemanual/scripts/scripts/Draw/Text/doc/Text_ja.html">テキスト機能</a>のマニュアルも参照してください。</p>
<p>テキストダイアログを閉じた後、テキストを揃える対象のエンティティを選択します。必要に応じてオプションツールバーのオプションを調整し、テキストの位置をクリックします。</p></body>
