<h3>說明</h3>
<p>選擇給定矩形區域內的所有實體。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇<a href="/zh_TW/manual/scripts/Select/doc/Select#mode">選擇模式</a>。</li>
<li>勾選<a href="/zh_TW/manual/scripts/Select/doc/Select#cross">交叉選擇</a>的核取方塊，以同時選擇與給定矩形相交的實體。</li>
<li>用滑鼠繪製選擇矩形。所有符合的實體都會根據選擇模式被選擇或取消選擇。</li>
</ol></body>
