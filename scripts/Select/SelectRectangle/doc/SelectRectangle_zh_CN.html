<h3>说明</h3>
<p>选择给定矩形区域内的所有实体。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择<a href="/zh_CN/manual/scripts/Select/doc/Select#mode">选择模式</a>。</li>
<li>勾选<a href="/zh_CN/manual/scripts/Select/doc/Select#cross">交叉选择</a>的复选框，以同时选择与给定矩形相交的实体。</li>
<li>用鼠标绘制选择矩形。所有匹配的实体都会根据选择模式被选择或取消选择。</li>
