<h3>说明</h3>
<p>选择或取消选择与所选实体在同一图层上的所有实体。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择<a href="/zh_CN/manual/scripts/Select/doc/Select#mode">选择模式</a>。</li>
<li>用鼠标选取您要（取消）选择的图层上的一个实体。所有与您选取的实体在同一图层上的实体都会根据选择模式被选择或取消选择。</li>
