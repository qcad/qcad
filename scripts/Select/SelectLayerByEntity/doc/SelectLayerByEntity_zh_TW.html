<h3>說明</h3>
<p>選擇或取消選擇與所選實體在同一圖層上的所有實體。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇<a href="/zh_TW/manual/scripts/Select/doc/Select#mode">選擇模式</a>。</li>
<li>用滑鼠選取您要（取消）選擇的圖層上的一個實體。所有與您選取的實體在同一圖層上的實體都會根據選擇模式被選擇或取消選擇。</li>
