<h3>說明</h3>
<p>選擇或取消選擇被一條直線相交的所有實體。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇<a href="/zh_TW/manual/scripts/Select/doc/Select#mode">選擇模式</a>。</li>
<li>按一下相交線的起點。</li>
<li>按一下相交線的端點。</li>
<li>所有相交的實體都會根據選擇模式被選擇或取消選擇。</li>
