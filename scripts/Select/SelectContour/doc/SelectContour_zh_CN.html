<h3>说明</h3>
<p>选择或取消选择彼此相连并形成轮廓（封闭或开放）的实体。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择<a href="/zh_CN/manual/scripts/Select/doc/Select">选择模式</a>。</li>
<li>用鼠标选取要选择的轮廓的一个实体。然后，该工具从选定实体的端点向两个方向搜索直接或间接连接到该实体的实体。所有相连的实体都会根据所选的选择模式被选择或取消选择。</li>
</ol>
<p>除了使用此工具外，您只需双击一个实体即可选择它和所有相连的实体。</p></body>
