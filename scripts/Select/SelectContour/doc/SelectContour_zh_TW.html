<h3>說明</h3>
<p>選擇或取消選擇彼此相連並形成輪廓（封閉或開放）的實體。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇<a href="/zh_TW/manual/scripts/Select/doc/Select">選擇模式</a>。</li>
<li>用滑鼠選取要選擇的輪廓的一個實體。然後，該工具從選定實體的端點向兩個方向搜尋直接或間接連接到該實體的實體。所有相連的實體都會根據所選的選擇模式被選擇或取消選擇。</li>
</ol>
<p>除了使用此工具外，您只需雙擊一個實體即可選擇它和所有相連的實體。</p></body>
