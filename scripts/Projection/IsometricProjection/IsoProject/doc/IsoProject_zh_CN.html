<h3>说明</h3>
<p>此工具创建图形中当前选区的等轴测投影（和其他类型的投影）。</p><h3>使用方法</h3>
<ol>
<li>选择要投影的实体。</li>
<li>启动此工具。</li>
<li>在选项工具栏中选择投影的投影类型和查看方向。</li>
<li>设置投影的参考点。这是您将在下一步中用于定位投影的点。</li>
<li>将鼠标光标移动到要创建投影的位置，然后单击以设置位置。</li>
</ol></body>
