<h3>說明</h3>
<p>此工具建立圖紙中目前選區的等角投影（和其他類型的投影）。</p><h3>使用方式</h3>
<ol>
<li>選擇要投影的實體。</li>
<li>啟動此工具。</li>
<li>在選項工具列中選擇投影的投影類型和檢視方向。</li>
<li>設定投影的參考點。這是您將在下一步中用於定位投影的點。</li>
<li>將滑鼠游標移動到要建立投影的位置，然後按一下以設定位置。</li>
</ol></body>
