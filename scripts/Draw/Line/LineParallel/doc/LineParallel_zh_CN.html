<h3>说明</h3>
<p>使用此工具，您可以创建与现有直线平行的线（或同心圆弧和圆）。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择所需的<a href="/zh_CN/manual/scripts/Draw/Line/doc/Line#type">线型</a>。</li>
<li>在顶部显示的选项工具栏中输入同心或平行实体与原始实体的距离。</li>
<li>在选项工具栏中输入要创建的平行或同心实体的数量。</li>
<li>单击基准实体。平行或同心实体将创建在选择实体时鼠标光标所在的一侧。</li>
</ol></body>
