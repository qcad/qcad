<h3>說明</h3>
<p>使用此工具，您可以建立與現有直線平行的線（或同心圓弧和圓）。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇所需的<a href="/zh_TW/manual/scripts/Draw/Line/doc/Line#type">線型</a>。</li>
<li>在頂部顯示的選項工具列中輸入同心或平行實體與原始實體的距離。</li>
<li>在選項工具列中輸入要建立的平行或同心實體數量。</li>
<li>按一下基準實體。平行或同心實體將建立在選擇實體時滑鼠游標所在的一側。</li>
</ol></body>
