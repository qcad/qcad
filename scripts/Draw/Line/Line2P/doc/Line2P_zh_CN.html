<h3>说明</h3>
<p>此工具让您绘制一条或多条直线的序列。</p><h3>使用方法</h3>
<p> </p>
<ol>
<li>在选项工具栏中选择所需的<a href="/zh_CN/manual/scripts/Draw/Line/doc/Line#type">线型</a>。</li>
<li>指定第一条线段的起点。您可以使用鼠标或在控制台中输入坐标。</li>
<li>指定第一条线段的端点。</li>
<li>指定其他线段的端点。单击选项工具栏中的"Close"按钮以闭合序列：<br/><img src="Close.png" alt="Close" width="40" height="40" /><br/> 如果您需要撤销单条线段，可以单击"Undo"按钮：<br/><img src="Undo.png" alt="Undo" width="40" height="40" /><br/></li>
<li>您可以使用选项工具栏中的相应输入框将直线的长度或角度设置为固定值。</li>
</ol></body>
