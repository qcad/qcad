<h3>說明</h3>
<p>此工具讓您繪製一條或多條直線的序列。</p><h3>使用方式</h3>
<p> </p>
<ol>
<li>在選項工具列中選擇所需的<a href="/zh_TW/manual/scripts/Draw/Line/doc/Line#type">線型</a>。</li>
<li>指定第一條線段的起點。您可以使用滑鼠或在控制台中輸入座標。</li>
<li>指定第一條線段的端點。</li>
<li>指定其他線段的端點。按一下選項工具列中的「Close」按鈕以閉合序列：<br/><img src="Close.png" alt="Close" width="40" height="40" /><br/> 如果您需要復原單條線段，可以按一下「Undo」按鈕：<br/><img src="Undo.png" alt="Undo" width="40" height="40" /><br/></li>
<li>您可以使用選項工具列中的相應輸入框將直線的長度或角度設定為固定值。</li>
</ol></body>
