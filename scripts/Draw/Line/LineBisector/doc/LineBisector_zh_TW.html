<h3>說明</h3>
<p>使用此工具在兩個直線實體之間建立角平分線。</p><h3>使用方式</h3>
<p></p>
<ol>
<li>在選項工具列中選擇所需的<a href="/zh_TW/manual/scripts/Draw/Line/doc/Line#type">線型</a>。</li>
<li>在選項工具列中輸入從兩條直線交點開始的平分線長度。在第二個文字框中，選擇要建立的角平分線數量。預設為「1」，但您也可以建立多條平分線，如下所示：<br/><img src="LineBisectorFigure.png" alt="LineBisectorFigure" width="280" height="100" /><br/></li>
<li>按一下限制角度的第一個直線實體。</li>
<li>將滑鼠游標放在要建立角平分線的直線一側，按一下第二個直線實體。預覽會在建立之前顯示角平分線。</li>
</ol></body>
