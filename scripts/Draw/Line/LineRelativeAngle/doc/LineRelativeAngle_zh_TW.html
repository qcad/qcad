<h3>說明</h3>
<p>使用此工具建立與現有實體成相對角度的直線。現有實體可以是直線或圓弧/圓。與圓弧成 0 度相對角度的直線是切線或切線的平行線。與圓弧或直線成 90 度相對角度的直線是正交線。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇所需的<a href="/zh_TW/manual/scripts/Draw/Line/doc/Line#type">線型</a>。</li>
<li>在選項工具列中輸入相對角度。</li>
<li>按一下現有的基準實體。</li>
<li>用滑鼠或在指令行中輸入座標來放置直線。</li>
</ol></body>
