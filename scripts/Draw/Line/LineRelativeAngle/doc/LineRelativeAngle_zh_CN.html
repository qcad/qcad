<h3>说明</h3>
<p>使用此工具创建与现有实体成相对角度的直线。现有实体可以是直线或圆弧/圆。与圆弧成 0 度相对角度的直线是切线或切线的平行线。与圆弧或直线成 90 度相对角度的直线是正交线。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择所需的<a href="/zh_CN/manual/scripts/Draw/Line/doc/Line#type">线型</a>。</li>
<li>在选项工具栏中输入相对角度。</li>
<li>单击现有的基准实体。</li>
<li>用鼠标或在命令行中输入坐标来放置直线。</li>
</ol></body>
