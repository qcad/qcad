<h3>说明</h3>
<p>使用此工具创建具有给定角度的直线。创建后通常会将直线修剪到所需的长度。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择所需的<a href="/zh_CN/manual/scripts/Draw/Line/doc/Line#type">线型</a>。</li>
<li>在选项工具栏中输入直线的角度和长度。</li>
<li>在选项工具栏中，选择要用于定位直线的直线上的参考点。"Start"表示直线的起点将位于您定位它的点。</li>
<li>用鼠标或在命令行中输入坐标来放置直线。</li>
</ol></body>
