<h3>說明</h3>
<p>使用此工具建立具有給定角度的直線。建立後通常會將直線修剪到所需的長度。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇所需的<a href="/zh_TW/manual/scripts/Draw/Line/doc/Line#type">線型</a>。</li>
<li>在選項工具列中輸入直線的角度和長度。</li>
<li>在選項工具列中，選擇要用於定位直線的直線上的參考點。「Start」表示直線的起點將位於您定位它的點。</li>
<li>用滑鼠或在指令行中輸入座標來放置直線。</li>
</ol></body>
