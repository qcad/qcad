<h3>說明</h3>
<p>使用此工具從一個現有的圓弧或圓實體建立到另一個的切線。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇所需的<a href="/zh_TW/manual/scripts/Draw/Line/doc/Line#type">線型</a>。</li>
<li>按一下要建立切線的第一個圓弧或圓實體。</li>
<li>按一下要建立切線的第二個圓弧或圓實體。通常有四條可能的切線。移動滑鼠時，您可以看到將要建立的切線的預覽。</li>
