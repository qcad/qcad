<h3>说明</h3>
<p>使用此工具，您可以创建与现有直线平行的线或同心圆弧和圆。平行或同心圆弧或圆通过给定的点。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择所需的<a href="/zh_CN/manual/scripts/Draw/Line/doc/Line#type">线型</a>。</li>
<li>在选项工具栏中输入要创建的实体的数量。</li>
<li>单击基准实体。</li>
<li>单击第一条平行或同心圆弧或圆经过的位置。</li>
</ol></body>
