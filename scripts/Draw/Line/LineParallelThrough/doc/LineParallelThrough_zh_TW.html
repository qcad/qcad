<h3>說明</h3>
<p>使用此工具，您可以建立與現有直線平行的線或同心圓弧和圓。平行或同心圓弧或圓通過給定的點。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇所需的<a href="/zh_TW/manual/scripts/Draw/Line/doc/Line#type">線型</a>。</li>
<li>在選項工具列中輸入要建立的實體數量。</li>
<li>按一下基準實體。</li>
<li>按一下第一條平行或同心圓弧或圓經過的位置。</li>
</ol></body>
