<h3>说明</h3>
<p>使用此工具创建一条与另一条直线正交并与现有圆弧、圆或椭圆实体相切的直线。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择所需的<a href="/zh_CN/manual/scripts/Draw/Line/doc/Line#type">线型</a>。</li>
<li>单击新直线应与之正交的直线实体。</li>
<li>单击直线应与之相切的圆弧、圆或椭圆实体。有两个可能的解。移动鼠标时，您可以看到将要创建的切线的预览。</li>
</ol></body>
