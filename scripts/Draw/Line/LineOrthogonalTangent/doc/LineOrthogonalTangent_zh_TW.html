<h3>說明</h3>
<p>使用此工具建立一條與另一條直線正交並與現有圓弧、圓或橢圓實體相切的直線。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇所需的<a href="/zh_TW/manual/scripts/Draw/Line/doc/Line#type">線型</a>。</li>
<li>按一下新直線應與之正交的直線實體。</li>
<li>按一下直線應與之相切的圓弧、圓或橢圓實體。有兩個可能的解。移動滑鼠時，您可以看到將要建立的切線的預覽。</li>
</ol></body>
