<h3>說明</h3>
<p>使用此工具從座標建立到現有圓弧、圓或橢圓實體的切線。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇所需的<a href="/zh_TW/manual/scripts/Draw/Line/doc/Line#type">線型</a>。</li>
<li>用滑鼠指定直線起點的位置，或在指令行中輸入座標。</li>
<li>按一下要建立切線的實體。通常有兩條可能的切線。移動滑鼠時，您可以看到將要建立的切線的預覽。</li>
</ol></body>
