<h3>说明</h3>
<p>使用此工具从坐标创建到现有圆弧、圆或椭圆实体的切线。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择所需的<a href="/zh_CN/manual/scripts/Draw/Line/doc/Line#type">线型</a>。</li>
<li>用鼠标指定直线起点的位置，或在命令行中输入坐标。</li>
<li>单击要创建切线的实体。通常有两条可能的切线。移动鼠标时，您可以看到将要创建的切线的预览。</li>
</ol></body>
