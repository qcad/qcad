<h3>說明</h3>
<p></p>
<p>使用此工具，您可以繪製手繪線。由於技術圖紙需要絕對精確，因此此工具通常很少使用。但是，在某些情況下，此工具可能會派上用場，例如用於如下所示的斷裂邊緣：</p>
<p><img src="LineFreehandFigure.png" alt="LineFreehandFigure" width="356" height="214" /><br/></p><h3>使用方式</h3>
<ol>
<li>將滑鼠放在手繪線的起點，按住滑鼠左鍵。</li>
<li>現在移動滑鼠以繪製直線。在手繪線的端點處，放開滑鼠按鈕。</li>
</ol></body>
