<h3>说明</h3>
<p></p>
<p>使用此工具，您可以绘制手绘线。由于技术图纸需要绝对精确，因此此工具通常很少使用。但是，在某些情况下，此工具可能会派上用场，例如用于如下所示的断裂边缘：</p>
<p><img src="LineFreehandFigure.png" alt="LineFreehandFigure" width="356" height="214" /><br/></p><h3>使用方法</h3>
<ol>
<li>将鼠标放在手绘线的起点，按住鼠标左键。</li>
<li>现在移动鼠标以绘制直线。在手绘线的端点处，松开鼠标按钮。</li>
</ol></body>
