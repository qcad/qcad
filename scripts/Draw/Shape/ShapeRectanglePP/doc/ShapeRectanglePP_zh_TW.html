<h3>說明</h3>
<p>使用此工具從兩個對角線相對的角建立矩形。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇所需的常用<a href="/zh_TW/manual/scripts/Draw/Shape/doc/Shape">形狀選項</a>。</li>
<li>指定矩形的第一個角。</li>
<li>將滑鼠移動到第二個角並按一下以指定矩形的第二個角。或者，您可以在指令提示中輸入第二個角的座標。例如，要建立寬度為 50、高度為 25 的矩形，請按如下方式輸入第二個角的相對座標： @50,25</li>
</ol></body>
