<h3>说明</h3>
<p>使用此工具从两个对角线相对的角创建矩形。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择所需的常用<a href="/zh_CN/manual/scripts/Draw/Shape/doc/Shape">形状选项</a>。</li>
<li>指定矩形的第一个角。</li>
<li>将鼠标移动到第二个角并单击以指定矩形的第二个角。或者，您可以在命令提示符中输入第二个角的坐标。例如，要创建宽度为 50、高度为 25 的矩形，请按如下方式输入第二个角的相对坐标： @50,25</li>
</ol></body>
