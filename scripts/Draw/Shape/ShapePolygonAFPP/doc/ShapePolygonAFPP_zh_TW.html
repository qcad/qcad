<h3>說明</h3>
<p>從兩個相對的角或邊建立多邊形。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中選擇所需的常用<a href="/zh_TW/manual/scripts/Draw/Shape/doc/Shape">形狀選項</a>。</li>
<li>在選項工具列中輸入多邊形的邊數（邊/角的數量）。有效數字範圍為 3 到 99。</li>
<li>選擇 Corner to Corner 選項以用兩個相對的角定義多邊形。</li>
<li>用滑鼠設定多邊形的第一個角或一條邊的中點，或在指令行中輸入座標。</li>
<li>設定多邊形的第二個相對的角或一條邊的中點。</li>
</ol></body>
