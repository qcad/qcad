<h3>说明</h3>
<p>使用此工具创建具有给定大小的矩形。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择所需的常用 <a href="/zh_CN/manual/scripts/Draw/Shape/doc/Shape">形状选项</a>。</li>
<li>在选项工具栏中输入矩形的大小。</li>
<li>选择用于定位矩形的参考点。</li>
<li>用鼠标或在命令行中输入坐标指定矩形的位置。</li>
