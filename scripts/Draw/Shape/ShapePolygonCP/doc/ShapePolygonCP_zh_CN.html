<h3>说明</h3>
<p>用给定的中心和一个角创建多边形。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中选择所需的常用<a href="/zh_CN/manual/scripts/Draw/Shape/doc/Shape">形状选项</a>。</li>
<li>在选项工具栏中输入多边形的边数（边/角的数量）。有效数字范围为 3 到 99。</li>
<li>用鼠标设置多边形的中心或在命令行中输入坐标。</li>
<li>设置多边形的第一个角。</li>
</ol></body>
