<h3>説明</h3>
<p>中心と一辺の中点を使用して多角形を作成します。</p><h3>使用方法</h3>
<ol>
<li>オプションツールバーで目的の共通の<a href="qthelp://org.qcad/referencemanual/scripts/Draw/Shape/doc/Shape_ja.html">シェイプオプション</a>を選択します。</li>
<li>オプションツールバーに多角形の次数（辺 / 角の数）を入力します。有効な数値は 3 から 99 です。</li>
<li>マウスを使用して多角形の中心を設定するか、コマンドラインに座標を入力します。</li>
<li>多角形の一辺の中点を設定します。</li>
</ol></body>
