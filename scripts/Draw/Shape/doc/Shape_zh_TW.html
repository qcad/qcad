<h3>說明</h3>
<p>形狀是封閉的幾何圖形，例如矩形或正多邊形。</p>
<h4>常見形狀選項</h4>
<p><em>多重線</em></p>
<p>形狀工具可以建立鬆散的線條和弧線，或是封閉的多重曲線。 勾選「建立多重曲線」可為所建形狀建立單一多重曲線實體。</p>
<p><em>填滿</em></p>
<p>勾選「填滿」核取方塊可在形狀邊界之外建立實體填滿。</p>
<p><em>半徑</em></p>
<p>勾選 "Radius"（半徑）核取方塊，以給定的半徑圓整形狀的所有角落。</p></body>
