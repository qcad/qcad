<h3>說明</h3>
<p>使用此工具，您可以建立與橢圓平行並通過指定點的曲線。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中輸入要建立的平行曲線數量。</li>
<li>按一下基準橢圓。</li>
<li>按一下第一條平行曲線應通過的位置。</li>
