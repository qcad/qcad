<h3>說明</h3>
<p>繪製具有給定圓心、長軸和短軸的橢圓。</p><h3>使用方式</h3>
<ol>
<li>用滑鼠設定橢圓的圓心或在指令行中輸入座標。</li>
<li>通過按一下軸的端點（橢圓上的一個點）來定義長軸。您也可以在指令行中輸入座標，或以 @50&lt;30 格式輸入角度和長半徑，其中 50 是長半徑，30 是橢圓角度。</li>
<li>定義短軸的端點（也是橢圓上的一個點）。</li>
</ol></body>
