<h3>说明</h3>
<p>绘制具有给定长直径和短直径（宽度/高度）的椭圆。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中输入 X 方向的直径（长直径）、Y 方向的直径（短直径）和椭圆角度。</li>
<li>用鼠标设置椭圆的圆心或在命令行中输入坐标。</li>
</ol></body>
