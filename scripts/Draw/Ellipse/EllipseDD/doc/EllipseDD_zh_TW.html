<h3>說明</h3>
<p>繪製具有給定長直徑和短直徑（寬度/高度）的橢圓。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中輸入 X 方向的直徑（長直徑）、Y 方向的直徑（短直徑）和橢圓角度。</li>
<li>用滑鼠設定橢圓的圓心或在指令行中輸入座標。</li>
</ol></body>
