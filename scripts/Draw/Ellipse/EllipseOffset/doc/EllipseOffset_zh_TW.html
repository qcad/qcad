<h3>說明</h3>
<p>使用此工具，您可以建立一條或多條與現有橢圓保持給定距離的平行曲線。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中輸入平行曲線與原始基準橢圓的距離。</li>
<li>在選項工具列中輸入要建立的平行曲線數量。</li>
<li>按一下基準橢圓。同心曲線將建立在按一下基準橢圓時滑鼠游標所在的一側。</li>
</ol></body>
