<h3>說明</h3>
<p>標註用於向圖紙添加測量值。 標註通常由文字標籤以及一些線和箭頭組成，以指示測量的精確位置。文字標籤可以附帶公差指示或符號。建立標註時顯示的選項工具列可幫助您定義標註標籤內容及其公差。</p></body>
