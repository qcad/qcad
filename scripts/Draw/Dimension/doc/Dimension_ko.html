<h3>설명</h3>
<p>치수는 도면에 측정값을 추가하는 데 사용됩니다. 치수는 일반적으로 텍스트 레이블과 측정의 정확한 위치를 나타내는 몇 개의 선과 화살표로 구성됩니다. 텍스트 레이블에는 공차 표시나 기호가 함께 표시될 수 있습니다. 치수를 만드는 동안 표시되는 옵션 도구 모음은 치수 레이블 내용과 그 공차를 정의하는 데 도움이 됩니다.</p></body>
