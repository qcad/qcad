<h3>說明</h3>
<p>建立旋轉（線性）標註。線性標註通常用於測量垂直或水平距離，但也可以測量任何其他角度的距離。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中輸入標註的角度。</li>
<li>用滑鼠設定第一條延伸線端點或在指令行中輸入座標。</li>
<li>設定第二條延伸線端點。</li>
<li>設定標註線的位置。</li>
</ol></body>
