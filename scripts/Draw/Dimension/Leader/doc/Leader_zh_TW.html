<h3>說明</h3>
<p></p>
<p>導線是通常從文字實體指向另一個實體的箭頭，如下所示。在此範例中，文字實體「N7」通過用導線指向它來描述一個表面屬性。</p>
<p><img src="LeaderFigure.png" alt="LeaderFigure" width="199" height="111" /><br/></p><h3>使用方式</h3>
<ol>
<li>設定導線指向的位置，或在指令行中輸入座標。</li>
<li>設定導線的下一條邊的位置。</li>
<li>設定導線的其他邊，然後按一下滑鼠右鍵或按 Escape 鍵完成。</li>
