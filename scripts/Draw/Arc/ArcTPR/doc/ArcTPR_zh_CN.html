<h3>说明</h3>
<p>绘制一条具有给定半径、与实体相切并通过某点的圆弧。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中输入半径。</li>
<li>指定相切实体。</li>
<li>指定圆弧上的点。</li>
<li>通过用鼠标左键在靠近所需解处单击来选择它。</li>
