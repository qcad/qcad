<h3>說明</h3>
<p>使用起點、端點和半徑繪製圓弧。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中輸入圓弧半徑，並選擇圓弧方向（順時針或逆時針）和解（較大的圓弧或較小的圓弧）。</li>
<li>指定圓弧的起點。</li>
<li>指定圓弧的端點。如果端點距離起點太遠而無法求解，則繪製最接近的解（具有給定半徑和方向的半圓）。</li>
</ol></body>
