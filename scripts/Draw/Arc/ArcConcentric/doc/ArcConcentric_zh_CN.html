<h3>说明</h3>
<p>使用此工具，您可以创建一个或多个与现有圆弧保持给定距离的同心圆弧。</p><h3>使用方法</h3>
<ol>
<li>在选项工具栏中输入同心圆弧与原始基准圆弧的距离。</li>
<li>在选项工具栏中输入要创建的同心圆弧的数量。</li>
<li>单击基准圆弧。同心圆弧将创建在单击基准圆弧时鼠标光标所在的一侧。</li>
</ol></body>
