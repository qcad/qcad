<h3>說明</h3>
<p>使用此工具，您可以建立一個或多個與現有圓保持給定距離的同心圓。</p><h3>使用方式</h3>
<ol>
<li>在選項工具列中輸入同心圓與原始基準圓的距離。</li>
<li>在選項工具列中輸入要建立的同心圓數量。</li>
<li>按一下基準圓。同心圓將建立在按一下基準圓時滑鼠游標所在的一側。</li>
</ol></body>
