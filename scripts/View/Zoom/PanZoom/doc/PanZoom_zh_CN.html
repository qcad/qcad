<br /><b>快捷方式:</b> <font face="courier new">Z, P</font>

<h3>说明</h3>
<p>平移意味着在图形中移动（滚动）。最快的方法是使用鼠标中键并像移动纸张一样移动视图：按住鼠标中键并在移动图形时保持按下。如果您的鼠标没有鼠标中键，您可以按 Control 键（Mac OS X：Command 键）并改用鼠标左键。 或者，您可以激活此工具，然后用鼠标左键移动视图而无需按任何键。 完成后单击鼠标右键。</p></body>
