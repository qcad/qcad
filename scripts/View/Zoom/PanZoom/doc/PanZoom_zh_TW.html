<h3>說明</h3>
<p>平移意味著在圖紙中移動（捲動）。最快的方法是使用滑鼠中鍵並像移動紙張一樣移動檢視：按住滑鼠中鍵並在移動圖紙時保持按下。如果您的滑鼠沒有滑鼠中鍵，您可以按 Control 鍵（Mac OS X：Command 鍵）並改用滑鼠左鍵。 或者，您可以啟用此工具，然後用滑鼠左鍵移動檢視而無需按任何鍵。 完成後按一下滑鼠右鍵。</p></body>
