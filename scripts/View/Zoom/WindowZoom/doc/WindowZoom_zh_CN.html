<h3>说明</h3>
<p>此工具提供了一种快速放大图形某个区域的方法。</p><h3>使用方法</h3>
<ol>
<li>指定要查看的区域的第一个角。在该角按下鼠标左键并保持按下。</li>
<li>将鼠标拖动到区域的第二个角。</li>
<li>在第二个角松开鼠标按钮。</li>
</ol>
<p>注意：或者，您可以用单次鼠标单击分别指定第一个角和第二个角，而不是在按住鼠标按钮的情况下拖动鼠标。</p></body>
