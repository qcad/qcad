<h3>說明</h3>
<p>此工具提供了一種快速放大圖紙某個區域的方法。</p><h3>使用方式</h3>
<ol>
<li>指定要檢視的區域的第一個角。在該角按下滑鼠左鍵並保持按下。</li>
<li>將滑鼠拖曳到區域的第二個角。</li>
<li>在第二個角放開滑鼠按鈕。</li>
</ol>
<p>注意：或者，您可以用單次滑鼠按一下分別指定第一個角和第二個角，而不是在按住滑鼠按鈕的情況下拖曳滑鼠。</p></body>
