<h3>說明</h3>
<p>切換目前圖紙的基於螢幕的線型模式。 如果啟用此模式，線型將針對電腦螢幕進行最佳化。所有線都以基於螢幕的線寬顯示（放大時線不會變寬），並且所有圖案都以固定的、基於像素的圖案顯示在螢幕上（放大時虛線不會變長）。 如果此模式關閉，線寬和線型以圖紙單位顯示（預設）。</p></body>
