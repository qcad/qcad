<h2>基于屏幕的线型</h2>
<p class="toolinfo">

<b>菜单:</b> <font face="courier new">视图(V) &gt; 基于屏幕的线型</font>
<br /><b>快捷方式:</b> <font face="courier new">N, L</font>
<br /><b>命令:</b> <font face="courier new">screenlinetype | nl</font>
</p>
</div>
<h3>说明</h3>
<p>切换当前图形的基于屏幕的线型模式。 如果激活此模式，线型将针对计算机屏幕进行优化。所有线都以基于屏幕的线宽显示（放大时线不会变宽），并且所有图案都以固定的、基于像素的图案显示在屏幕上（放大时虚线不会变长）。 如果此模式关闭，线宽和线型以图形单位显示（默认）。</p></body>
