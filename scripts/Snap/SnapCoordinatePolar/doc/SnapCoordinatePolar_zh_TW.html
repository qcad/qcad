<h3>說明</h3>
<p>通過輸入絕對或相對極座標來定義點。</p><h3>使用方式</h3>
<p></p>
<ol>
<li>當您必須指定一個點並想通過輸入極座標來做到這一點時，啟動此工具。</li>
<li>在選項工具列中輸入極座標（半徑和角度），並選擇它是絕對座標還是相對座標（相對於相對零點）。</li>
<li>按一下 OK 按鈕或按 Enter 確認輸入並設定座標：<br/><img src="Tick.png" alt="Tick" width="40" height="40" /><br/></li>
