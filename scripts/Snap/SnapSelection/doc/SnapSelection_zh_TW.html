<h3>說明</h3>
<p>捕捉到目前選區周圍邊界框的九個參考點之一：四個角、四條邊的中點或中心。使用最接近滑鼠游標的點。 此捕捉工具對於相對於網格或其他實體移動、複製或以其他方式對齊選區很有用，例如將選區的中心或一個角放置在特定位置。</p></body>
