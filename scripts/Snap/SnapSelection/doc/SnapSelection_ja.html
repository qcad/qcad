<h3>説明</h3>
<p>現在の選択範囲を囲むバウンディングボックスの9つの基準点（四隅、4辺の中点、 または中心）のいずれかにスナップします。マウスカーソルに最も近い点が使用され ます。 このスナップツールは、選択範囲をグリッドや他のエンティティに対して移動、コピー、 または位置合わせするのに便利です。たとえば、選択範囲の中心や隅を特定の位置に 配置できます。</p></body>
