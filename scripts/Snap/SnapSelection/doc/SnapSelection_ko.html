<h3>설명</h3>
<p>현재 선택 주위의 경계 상자의 아홉 개 기준점 중 하나에 스냅합니다: 네 모서리, 네 변의 중간점 또는 중심. 마우스 커서에 가장 가까운 점이 사용됩니다. 이 스냅 도구는 그리드나 다른 개체를 기준으로 선택을 이동, 복사 또는 다른 식으로 정렬하는 데 유용합니다. 예를 들어 선택의 중심이나 모서리를 특정 위치에 배치하는 데 사용합니다.</p></body>
