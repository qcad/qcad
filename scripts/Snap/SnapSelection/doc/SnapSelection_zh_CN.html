<h3>说明</h3>
<p>捕捉到当前选区周围边界框的九个参考点之一：四个角、四条边的中点或中心。使用最接近鼠标光标的点。 此捕捉工具对于相对于网格或其他实体移动、复制或以其他方式对齐选区很有用，例如将选区的中心或一个角放置在特定位置。</p></body>
