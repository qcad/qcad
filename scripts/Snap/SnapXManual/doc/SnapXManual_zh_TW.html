<h3>說明</h3>
<p>此捕捉工具可用於從一個現有實體的位置提取一個座標（例如 X），從另一個物件的位置提取另一個座標（例如 Y）。 例如，這可用於定位矩形的中心。 此概念也稱為「組合座標」、「點過濾」或「座標過濾」。</p><h3>使用方式</h3>
<ol>
<li>指定位置時，啟動此工具。</li>
<li>按一下圖紙中的一個位置以在該位置鎖定 X 座標。</li>
<li>按一下圖紙中的一個位置以在該位置鎖定 Y 座標。</li>
</ol></body>
