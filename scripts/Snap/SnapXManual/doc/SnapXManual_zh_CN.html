<h3>说明</h3>
<p>此捕捉工具可用于从一个现有实体的位置提取一个坐标（例如 X），从另一个对象的位置提取另一个坐标（例如 Y）。 例如，这可用于定位矩形的中心。 此概念也称为"组合坐标"、"点过滤"或"坐标过滤"。</p><h3>使用方法</h3>
<ol>
<li>指定位置时，启动此工具。</li>
<li>单击图形中的一个位置以在该位置锁定 X 坐标。</li>
<li>单击图形中的一个位置以在该位置锁定 Y 坐标。</li>
</ol></body>
