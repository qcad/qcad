<h3>说明</h3>
<p>有时交点捕捉模式无法用于捕捉交点，因为交点位于一个或两个实体之外。此捕捉工具让您明确指定两个相交实体并捕捉到它们的交点。</p><h3>使用方法</h3>
<p></p>
<ol>
<li>激活此捕捉工具后，单击两个相交实体中的第一个。</li>
<li>单击两个相交实体中的第二个。如果可能有两个交点，请务必在靠近您要捕捉的交点处单击第二个实体。</li>
</ol>
