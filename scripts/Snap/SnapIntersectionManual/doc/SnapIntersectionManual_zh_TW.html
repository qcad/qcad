<h3>說明</h3>
<p>有時交點捕捉模式無法用於捕捉交點，因為交點位於一個或兩個實體之外。此捕捉工具讓您明確指定兩個相交實體並捕捉到它們的交點。</p><h3>使用方式</h3>
<p></p>
<ol>
<li>啟用此捕捉工具後，按一下兩個相交實體中的第一個。</li>
<li>按一下兩個相交實體中的第二個。如果可能有兩個交點，請務必在靠近您要捕捉的交點處按一下第二個實體。</li>
</ol>
