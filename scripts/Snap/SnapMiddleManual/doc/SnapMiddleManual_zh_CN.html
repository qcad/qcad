<h3>说明</h3>
<p>此工具允许您捕捉到位于两点之间中间的点。这最常用于通过选择两个对角线相对的角来捕捉到矩形或多边形的中心。</p><h3>使用方法</h3>
<p></p>
<ol>
<li>激活此捕捉工具后，指定定义中点的两个点中的第一个。例如矩形的一个角。</li>
<li>单击两个点中的第二个，例如矩形的对角线相对的角。</li>
</ol>
