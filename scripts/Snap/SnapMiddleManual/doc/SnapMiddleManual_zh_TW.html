<h3>說明</h3>
<p>此工具允許您捕捉到位於兩點之間中間的點。這最常用於通過選擇兩個對角線相對的角來捕捉到矩形或多邊形的中心。</p><h3>使用方式</h3>
<p></p>
<ol>
<li>啟用此捕捉工具後，指定定義中點的兩個點中的第一個。例如矩形的一個角。</li>
<li>按一下兩個點中的第二個，例如矩形的對角線相對的角。</li>
</ol>
