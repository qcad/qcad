<h3>說明</h3>
<p>將目前選區複製到 QCAD 剪貼簿。此工具讓您指定一個參考點，用於在將選區貼上到圖紙時定位選區。</p><h3>使用方式</h3>
<ol>
<li>使用選擇工具準備要複製到剪貼簿的實體選區。</li>
<li>啟動帶參考點複製工具。</li>
<li>指定要在貼上選區時使用的參考點。</li>
</ol></body>
