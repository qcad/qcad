<h3>说明</h3>
<p>将当前选区复制到 QCAD 剪贴板。此工具让您指定一个参考点，用于在将选区粘贴到图形时定位选区。</p><h3>使用方法</h3>
<ol>
<li>使用选择工具准备要复制到剪贴板的实体选区。</li>
<li>启动带参考点复制工具。</li>
<li>指定要在粘贴选区时使用的参考点。</li>
</ol></body>
