<h3>说明</h3>
<p>在应用程序首选项对话框中，您可以调整 QCAD 及其工具和图形视图的外观和行为。 QCAD 还将其中一些设置存储在图形内部。这些设置可以在应用程序首选项中作为新图形的默认设置进行更改。换句话说，它们不影响现有图形，只影响在更改首选项后创建的图形。</p></body>
