<h2>Command Line Tools</h2>
</div>
<h3>Beskrivning</h3>
<p>Kommandoradsverktyg är fristående skript som körs från en terminal i stället för från QCAD:s grafiska gränssnitt. De använder samma ritmotor som QCAD för att bearbeta ritningsfiler i batch, utan att öppna ett fönster, vilket gör dem väl lämpade för automatisering.</p></body>
