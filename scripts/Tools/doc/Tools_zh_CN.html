<h3>说明</h3>
<p>命令行工具是从终端而非从 QCAD 图形界面运行的独立脚本。它们使用与 QCAD 相同的绘图引擎批量处理图形文件，而无需打开窗口，这使它们非常适合自动化。</p></body>
