<h3>说明</h3>
<p>将块参照、多段线、样条、椭圆、文本、标注和填充转换为更基本的实体。标注被拆分为线、三角形和文本实体。文本实体被拆分为多段线（或线、弧和样条）。样条被转换为具有相切连接弧段的多段线。椭圆被转换为具有弧段的多段线。多段线被拆分为松散的段。填充被拆分为线。纯色填充被转换为纯色填充的轮廓。</p><h3>使用方法</h3>
<ol>
<li>选择要分解的实体。</li>
<li>启动此工具以分解选定的实体。</li>
<li>如果需要，重复步骤 2 以进一步打断选定的实体。如果实体无法进一步打断，它将保持不变。</li>
</ol></body>
