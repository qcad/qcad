<h3>說明</h3>
<p>將直線、圓弧或橢圓修剪或延伸到另一個實體。</p><h3>使用方式</h3>
<p></p>
<ol>
<li>選擇要將一個或多個其他實體修剪或延伸到的限制實體。</li>
<li>選擇要修剪到限制實體的實體。要修剪的實體通常有兩種可能性。在下面的範例中，您可能希望直線的上部保留在圖紙中，而下部被修剪掉。在這種情況下，您必須在上部按一下修剪實體。始終按一下您要保留的實體部分。</li>
<li>右鍵兩次或按 Escape 兩次以終止工具。</li>
</ol>
