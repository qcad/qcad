<h3>说明</h3>
<p>将直线、圆弧或椭圆修剪或延伸到另一个实体。</p><h3>使用方法</h3>
<p></p>
<ol>
<li>选择要将一个或多个其他实体修剪或延伸到的限制实体。</li>
<li>选择要修剪到限制实体的实体。要修剪的实体通常有两种可能性。在下面的示例中，您可能希望直线的上部保留在图形中，而下部被修剪掉。在这种情况下，您必须在上部单击修剪实体。始终单击您要保留的实体部分。</li>
<li>右击两次或按 Escape 两次以终止工具。</li>
</ol>
