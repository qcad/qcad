<h3>說明</h3>
<p>此工具可用於將直線或圓弧拉長或縮短給定的量。</p><h3>使用方式</h3>
<p></p>
<ol>
<li>在選項工具列中輸入要將實體拉長的距離。正值拉長實體，而負值縮短實體。例如，值「5」將使所選實體拉長 5 個單位。</li>
<li>在靠近要修改的一端選擇要拉長或縮短的實體。</li>
<li>右鍵或按 Escape 鍵終止工具。</li>
</ol>
