<h3>说明</h3>
<p>此工具可用于将直线或圆弧拉长或缩短给定的量。</p><h3>使用方法</h3>
<p></p>
<ol>
<li>在选项工具栏中输入要将实体拉长的距离。正值拉长实体，而负值缩短实体。例如，值"5"将使所选实体拉长 5 个单位。</li>
<li>在靠近要修改的一端选择要拉长或缩短的实体。</li>
<li>右击或按 Escape 键终止工具。</li>
</ol>
