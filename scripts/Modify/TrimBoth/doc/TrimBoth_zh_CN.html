<h3>说明</h3>
<p>将两条直线、圆弧或椭圆修剪或延伸到它们的公共交点。</p><h3>使用方法</h3>
<p></p>
<ol>
<li>选择要修剪的第一个实体。</li>
<li>选择要修剪的第二个实体。</li>
<li>右击两次或按 Escape 两次以终止工具。</li>
</ol>
