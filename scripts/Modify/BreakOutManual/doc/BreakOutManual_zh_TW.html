<h3>說明</h3>
<p>通過切除兩個使用者定義點之間的段來分割物件。</p><h3>使用方式</h3>
<ol>
<li>選擇要打斷的實體。</li>
<li>按一下實體要被分割的第一點。</li>
<li>如果該點不在實體上，則假定分隔點為實體上最接近的點。</li>
<li>按一下實體要被分割的第二點。</li>
<li>如果選項工具列中的「Remove Segment」選項處於作用中，則移除兩點之間的段。否則，實體僅在給定點處被分隔。</li>
</ol></body>
