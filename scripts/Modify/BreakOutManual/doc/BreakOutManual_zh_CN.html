<h3>说明</h3>
<p>通过切除两个用户定义点之间的段来分割对象。</p><h3>使用方法</h3>
<ol>
<li>选择要打断的实体。</li>
<li>单击实体要被分割的第一点。</li>
<li>如果该点不在实体上，则假定分隔点为实体上最接近的点。</li>
<li>单击实体要被分割的第二点。</li>
<li>如果选项工具栏中的"Remove Segment"选项处于活动状态，则移除两点之间的段。否则，实体仅在给定点处被分隔。</li>
</ol></body>
